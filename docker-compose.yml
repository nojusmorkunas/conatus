services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  mailpit:
    profiles: ["email-test"]
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-app}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      PGDATABASE: ${POSTGRES_DB:-app}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}
      BACKUP_KEEP: ${BACKUP_KEEP:-7}
    volumes:
      - backups:/backups
    entrypoint: ["sh", "-c"]
    command:
      - |
        while true; do
          pg_dump -Fc -f "/backups/app-$$(date -u +%Y%m%dT%H%M%SZ).dump"
          ls -1t /backups/app-*.dump | tail -n +$$((BACKUP_KEEP + 1)) | xargs -r rm --
          sleep "$$BACKUP_INTERVAL"
        done

  migrate:
    image: ${CONATUS_IMAGE:-ghcr.io/nojusmorkunas/conatus}:${CONATUS_VERSION:-latest}-ops
    command: ["npm", "run", "migrate"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-app}

  bootstrap:
    image: ${CONATUS_IMAGE:-ghcr.io/nojusmorkunas/conatus}:${CONATUS_VERSION:-latest}-ops
    command: ["npm", "run", "bootstrap"]
    restart: "no"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-app}
      CONATUS_ADMIN_USERNAME: ${CONATUS_ADMIN_USERNAME:-}
      CONATUS_ADMIN_PASSWORD: ${CONATUS_ADMIN_PASSWORD:-}

  app:
    image: ${CONATUS_IMAGE:-ghcr.io/nojusmorkunas/conatus}:${CONATUS_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      bootstrap:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-app}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_URL: ${AUTH_URL:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      REGISTRATION_MODE: ${REGISTRATION_MODE:-invite-only}
      S3_ENDPOINT: minio
      S3_PORT: 9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY in .env}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
      S3_BUCKET: ${S3_BUCKET:-attachments}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ERROR_WEBHOOK_URL: ${ERROR_WEBHOOK_URL:-}
    ports:
      - "${CONATUS_BIND_ADDRESS:-0.0.0.0}:${CONATUS_PORT:-4399}:3000"

  # Optional per-user MCP proxy. Start with: docker compose --profile mcp up -d
  # Create a scoped tdm_ token in Settings before enabling this profile.
  mcp:
    profiles: ["mcp"]
    image: ${CONATUS_MCP_IMAGE:-ghcr.io/nojusmorkunas/conatus-mcp}:${CONATUS_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      TASKS_BASE_URL: http://app:3000
      TASKS_API_TOKEN: ${TASKS_API_TOKEN:-tdm_configure_a_real_token_before_starting}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3001
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-}
      MCP_OAUTH_PASSWORD: ${MCP_OAUTH_PASSWORD:-}
      MCP_OAUTH_STORE_PATH: /data/oauth-store.json
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-http://localhost:4399}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - mcp-oauth-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db-data:
  minio-data:
  backups:
  mcp-oauth-data:
