name: Publish release images

on:
  release:
    types: [published]

concurrency:
  group: release-images-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: application
            image: ${{ github.repository }}
            context: .
            file: ./Dockerfile
            target: run
            tag_suffix: ""
          - name: operations
            image: ${{ github.repository }}
            context: .
            file: ./Dockerfile
            target: ops
            tag_suffix: -ops
          - name: MCP server
            image: ${{ github.repository }}-mcp
            context: ./mcp-server
            file: ./mcp-server/Dockerfile
            target: runtime
            tag_suffix: ""

    steps:
      - name: Check out the released commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }},suffix=${{ matrix.tag_suffix }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }},suffix=${{ matrix.tag_suffix }}
            type=raw,value=latest${{ matrix.tag_suffix }},enable=${{ !github.event.release.prerelease }}
          labels: |
            org.opencontainers.image.title=Conatus ${{ matrix.name }}
            org.opencontainers.image.description=Conatus self-hosted task manager
            org.opencontainers.image.licenses=AGPL-3.0-only

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          provenance: mode=max
          sbom: true

      - name: Attest image provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  deployment-files:
    name: Attach deployment files
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out the released commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Attach image-only deployment files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" docker-compose.yml .env.example --clobber
